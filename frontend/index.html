<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Career Decoder // UPLINK</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            margin: 0;
            overflow-x: hidden;
        }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .grid-bg {
            position: fixed;
            top: 0; left: 0; width: 200%; height: 200%;
            background-size: 60px 60px;
            background-image: 
                linear-gradient(to right, rgba(6, 182, 212, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
            animation: grid-move 40s linear infinite;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: top;
        }
        @keyframes grid-move {
            from { transform: perspective(500px) rotateX(60deg) translateY(0); }
            to { transform: perspective(500px) rotateX(60deg) translateY(-60px); }
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(6, 182, 212, 0.2);
        }

        .neon-glow {
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.3), inset 0 0 10px rgba(6, 182, 212, 0.1);
            animation: neon-pulse 4s ease-in-out infinite alternate;
        }
        @keyframes neon-pulse {
            from { box-shadow: 0 0 20px rgba(6, 182, 212, 0.3); }
            to { box-shadow: 0 0 35px rgba(6, 182, 212, 0.5); }
        }

        .glitch-title { animation: glitch-flicker 5s infinite; }
        
        .no-scrollbar {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }

        @keyframes glitch-flicker {
            0%, 90%, 100% { opacity: 1; transform: skew(0deg); }
            91% { opacity: 0.8; transform: skew(3deg); color: #d946ef; }
            92% { opacity: 1; transform: skew(-3deg); color: #22d3ee; }
        }

        .scanline {
            width: 100%; height: 100px; z-index: 10;
            background: linear-gradient(0deg, rgba(0, 0, 0, 0) 0%, rgba(34, 211, 238, 0.1) 50%, rgba(0, 0, 0, 0) 100%);
            opacity: 0.1; position: absolute; bottom: 100%;
            animation: scanline 6s linear infinite;
        }
        @keyframes scanline {
            0% { bottom: 100%; }
            100% { bottom: -100px; }
        }

        .bounty-block {
            background: linear-gradient(135deg, rgba(217, 70, 239, 0.1), rgba(6, 182, 212, 0.1));
            border: 2px solid rgba(34, 211, 238, 0.3);
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6 text-slate-200">
    <div class="grid-bg"></div>
    <div id="root" class="w-full max-w-7xl z-10"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const DEFAULT_AVATAR = "https://api.dicebear.com/7.x/identicon/svg?seed=fallback";

        const ProfileCard = ({ username, data }) => {
            const complexity = data?.complexity || 0;
            const repos = data?.repos || 0;
            const langs = (data?.languages || []).join(", ") || "N/A";
            
            return (
                <div id="capture-target" className="relative w-[340px] p-8 rounded-2xl border-2 border-fuchsia-500 bg-slate-950 text-cyan-400 font-mono shadow-[0_0_30px_rgba(34,211,238,0.2)] overflow-hidden">
                    <div className="scanline"></div>
                    <div className="relative z-10">
                        <div className="flex items-center mb-6 border-b border-fuchsia-500/30 pb-4">
                            <img src={data?.avatar || DEFAULT_AVATAR} crossOrigin="anonymous" onError={(e) => { e.target.onerror = null; e.target.src = DEFAULT_AVATAR; }} className="w-16 h-16 rounded-xl border-2 border-cyan-400 mr-4 bg-slate-900" />
                            <div>
                                <h1 className="text-lg font-black tracking-tighter text-white uppercase leading-none">{data?.public_name}</h1>
                                <p className="text-[9px] text-fuchsia-400 mt-1 italic font-bold">@{username} // UPLINK_STABLE</p>
                            </div>
                        </div>
                        
                        <div className="mb-6">
                            <h2 className="text-[9px] uppercase text-fuchsia-500 mb-1 tracking-widest font-black flex items-center gap-2">
                                <span className="w-1.5 h-1.5 bg-fuchsia-500 rounded-full animate-pulse"></span> Persona
                            </h2>
                            <p className="text-xs font-bold text-white">{data?.persona}</p>
                            <p className="text-[9px] text-slate-400 mt-1 italic">{data?.translation}</p>
                        </div>

                        <div className="mb-6 flex items-center gap-4 bg-slate-900/50 p-3 rounded-xl border border-slate-800">
                             <div className="relative w-12 h-12">
                                <svg className="w-full h-full transform -rotate-90">
                                    <circle cx="24" cy="24" r="20" stroke="currentColor" strokeWidth="4" fill="transparent" className="text-slate-800" />
                                    <circle cx="24" cy="24" r="20" stroke="currentColor" strokeWidth="4" fill="transparent" 
                                        strokeDasharray="125.6" 
                                        strokeDashoffset={125.6 - (125.6 * complexity / 100)} 
                                        className="text-fuchsia-500" />
                                </svg>
                                <div className="absolute inset-0 flex items-center justify-center text-[10px] font-black text-white">{complexity}%</div>
                            </div>
                            <div>
                                <div className="text-[8px] uppercase text-slate-500 font-bold">Core Complexity</div>
                                <div className="text-[10px] text-cyan-400 font-black tracking-widest uppercase">Validated</div>
                            </div>
                        </div>

                        <div className="mb-6 grid grid-cols-2 gap-4">
                            <div className="p-2 border border-cyan-500/20 bg-cyan-500/5 rounded-lg text-center flex flex-col justify-center">
                                <div className="text-[8px] opacity-60 uppercase">Repos</div>
                                <div className="text-sm font-black text-white">{repos}</div>
                            </div>
                            <div className="p-2 border border-blue-500/20 bg-blue-500/5 rounded-lg text-center overflow-hidden flex flex-col justify-center min-h-[52px]">
                                <div className="text-[8px] opacity-60 uppercase mb-0.5">Stack</div>
                                <div className="text-[9px] font-black text-white uppercase whitespace-normal break-words line-clamp-2 leading-tight">
                                    {langs}
                                </div>
                            </div>
                        </div>

                        <div className="mb-6">
                            <h2 className="text-[9px] uppercase text-cyan-400 mb-2 tracking-widest font-black flex items-center gap-2">
                                <span className="w-1.5 h-1.5 bg-cyan-400 rounded-full"></span> Alignment
                            </h2>
                            <div className="space-y-1">
                                {Object.entries(data?.alignments || {})
                                    .filter(([_, p]) => Number(p) > 0)
                                    .map(([name]) => (
                                        <div key={name} className="text-[10px] text-slate-300 font-bold flex items-center gap-2">
                                            <span className="text-fuchsia-500">•</span> {name}
                                        </div>
                                    ))
                                }
                            </div>
                        </div>

                        <div className="flex flex-wrap gap-2 mb-6">
                            {(data?.badges || []).map(b => (
                                <span key={b} className="text-[8px] bg-fuchsia-500/20 border border-fuchsia-500/40 px-2 py-0.5 rounded text-fuchsia-300 font-bold uppercase">
                                    {b}
                                </span>
                            ))}
                        </div>

                        <div className="p-4 border border-cyan-400/30 bg-cyan-400/5 rounded-xl">
                            <h2 className="text-[9px] uppercase text-cyan-300 mb-1 font-black">Next Evolution</h2>
                            <p className="text-[10px] text-white font-bold">{data?.evolution}</p>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [searchQuery, setSearchQuery] = useState('');
            const [loading, setLoading] = useState(false);
            const [result, setResult] = useState(null);
            const [error, setError] = useState(null);

            const handleGenerate = async () => {
                if (!searchQuery) return;
                setLoading(true); setError(null); setResult(null);
                try {
                    const response = await fetch("https://github-card-backend-236326372885.asia-south1.run.app/generate", {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: searchQuery })
                    });
                    const data = await response.json();
                    if (response.ok && data.status === 'success') setResult(data);
                    else setError(data.detail || "Target node not found.");
                } catch (err) { setError("Neural Uplink Offline."); }
                finally { setLoading(false); }
            };

            const handleDownload = async () => {
                const element = document.getElementById('capture-target');
                if (!element) return;
                const canvas = await html2canvas(element, { backgroundColor: "#020617", useCORS: true, allowTaint: true, scale: 2 });
                const link = document.createElement('a');
                link.download = `neural-card-${result.username}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
            };

            return (
                <div className="flex flex-col items-center space-y-10 w-full py-10">
                    <div className="text-center space-y-2">
                        <h1 className="text-4xl md:text-6xl font-black tracking-tighter text-white glitch-title uppercase">
                            Neural <span className="text-cyan-400">Decoder</span>
                        </h1>
                        <p className="mono text-[10px] tracking-[0.4em] uppercase text-cyan-400/60 font-bold">// Accessing GitHub Career Core</p>
                    </div>

                    <div className="glass-panel p-8 rounded-3xl w-full shadow-2xl space-y-8 border-b-4 border-cyan-500/50">
                        <div className="flex flex-col sm:flex-row gap-4">
                            <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleGenerate()} placeholder="target_identity..." className="flex-1 bg-slate-950/50 border border-cyan-500/30 rounded-full px-6 py-4 text-cyan-400 focus:outline-none focus:border-cyan-400 transition-all placeholder:text-cyan-900 mono font-bold" />
                            <button onClick={handleGenerate} disabled={loading} className="bg-cyan-500 hover:bg-cyan-400 text-slate-950 px-10 py-4 rounded-full font-black uppercase tracking-widest transition-all hover:scale-105 active:scale-95 disabled:opacity-50">{loading ? 'Scanning...' : 'Decode Persona'}</button>
                        </div>

                        <div className="min-h-[400px] flex items-center justify-center w-full">
                            {!result && !loading && !error && (
                                <div className="text-center animate-pulse py-20">
                                    <p className="mono text-lg tracking-[0.3em] text-cyan-400/40 font-bold uppercase">
                                        AWAITING UPLINK // ENTER TARGET NODE TO INITIALIZE SCAN
                                    </p>
                                </div>
                            )}

                            {loading && <div className="flex flex-col items-center gap-6 py-20"><div className="w-16 h-16 border-4 border-cyan-500/20 border-t-cyan-400 rounded-full animate-spin"></div><p className="mono text-xs animate-pulse tracking-widest text-cyan-400">Scanning Neural Network...</p></div>}
                            {error && <div className="bg-red-500/10 border-2 border-red-500 p-8 rounded-2xl text-center w-full max-w-md animate-bounce"><p className="text-red-500 font-black text-xl mb-2 uppercase tracking-tighter">!! Red Alert !!</p><p className="text-sm text-red-200 mono">{error}</p></div>}
                            
                            {result && (
                                <div className="fade-in flex flex-col lg:flex-row gap-10 w-full animate-[fadeIn_0.5s_ease-out]">
                                    <div className="mx-auto lg:mx-0 flex flex-col gap-4">
                                        <div className="glass-panel p-2 rounded-[2.5rem] neon-glow bg-slate-950/80 hover:scale-105 transition-transform duration-500">
                                            <ProfileCard username={result.username} data={result} />
                                        </div>
                                        <button onClick={handleDownload} className="w-full bg-fuchsia-500 hover:bg-fuchsia-400 text-white py-3 rounded-xl font-black uppercase tracking-[0.2em] text-xs transition-all hover:scale-105 active:scale-95 shadow-[0_0_15px_rgba(217,70,239,0.3)] flex items-center justify-center gap-2"><svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>Export Neural Identity</button>
                                    </div>

                                    <div className="flex-1 space-y-6 overflow-y-auto no-scrollbar max-h-[650px] pr-2">
                                        {/* Identity Badge */}
                                        <div className="glass-panel p-4 rounded-3xl flex items-center gap-4 border-l-4 border-cyan-400 bg-slate-900/50">
                                            <img src={result.avatar || DEFAULT_AVATAR} alt="Profile" onError={(e) => { e.target.onerror = null; e.target.src = DEFAULT_AVATAR; }} className="w-12 h-12 rounded-lg border border-cyan-400/50 shadow-[0_0_10px_rgba(34,211,238,0.3)] bg-slate-900" />
                                            <div className="flex-1 min-w-0">
                                                <div className="text-sm font-black text-white uppercase tracking-widest">{result?.public_name}</div>
                                                <div className="text-[9px] text-fuchsia-400 italic font-bold">@{result?.username} // UPLINK_STABLE</div>
                                                <div className="text-[8px] text-slate-500 uppercase mt-1">Stack: {(result?.languages || []).join(", ") || "N/A"}</div>
                                                
                                                <div className="mt-3 pt-3 border-t border-slate-800">
                                                    <div className="text-[7px] uppercase text-cyan-500/50 font-black tracking-widest mb-1">SUBJECT OVERVIEW</div>
                                                    <div className="text-[12px] text-slate-200 italic leading-relaxed line-clamp-3">"{result?.bio}"</div>
                                                </div>
                                            </div>
                                        </div>

                                        {/* Grid: Chronos + Bounty */}
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="glass-panel p-5 rounded-3xl border-l-4 border-blue-500 flex flex-col justify-center items-center">
                                                <h3 className="text-[10px] uppercase text-blue-400 mb-2 font-black tracking-widest text-center">Chronos Matrix</h3>
                                                <p className="text-[10px] font-bold text-white text-center leading-tight">{result?.chronos}</p>
                                            </div>

                                            <div className="bounty-block p-5 rounded-3xl text-center flex flex-col justify-center items-center">
                                                <h3 className="text-[10px] uppercase text-cyan-300 mb-1 font-black tracking-[0.2em]">Bounty</h3>
                                                <div className="text-xl font-black text-white tracking-tighter glow-text">{result?.bounty} <span className="text-[10px] text-cyan-400">CR</span></div>
                                            </div>
                                        </div>

                                        {/* Industry Domain Alignment */}
                                        <div className="glass-panel p-6 rounded-3xl border-l-4 border-fuchsia-500">
                                            <h3 className="mono text-[10px] uppercase text-fuchsia-400 mb-4 font-bold tracking-widest text-center">Industrial Alignment Matrix</h3>
                                            <div className="space-y-4">
                                                {Object.entries(result?.alignments || {}).filter(([_, p]) => Number(p) > 0).map(([f, p]) => (
                                                    <div key={f}>
                                                        <div className="flex justify-between text-[9px] mb-1 uppercase font-bold">
                                                            <span className="text-slate-400">{f}</span>
                                                            <span className="text-fuchsia-500">{p}%</span>
                                                        </div>
                                                        <div className="w-full bg-slate-900 h-2 rounded-full border border-fuchsia-500/20 flex justify-start items-center overflow-hidden">
                                                            <div className="bg-fuchsia-500 h-full shadow-[0_0_8px_#d946ef]" style={{ width: `${p}%` }}></div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Decoding Breakdown Inside Dashboard */}
                                        <div className="glass-panel p-5 rounded-3xl border-l-4 border-cyan-500 bg-slate-900/30">
                                            <h3 className="text-[10px] uppercase text-cyan-400 mb-2 font-black tracking-widest">Decoding Breakdown</h3>
                                            
                                            <p className="text-[10px] text-slate-400 mono leading-relaxed uppercase mb-2">
                                                SYSTEM_LOG: Persona assigned based on <span className="text-white">{result?.repos}</span> public clusters and dominant <span className="text-white">{result?.languages?.[0] || "Unknown"}</span> architecture.
                                            </p>
                                            
                                            <p className="text-[10px] text-slate-400 mono leading-relaxed uppercase">
                                                BOUNTY_LOG: <span className="text-cyan-400 font-bold">{result?.bounty} CR</span> calculated via Base(500) + Repos({result?.repos || 0} &times; 25) + Followers({result?.followers || 0} &times; 100) + Stars({result?.totalStars || 0} &times; 250).
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="mono text-[10px] opacity-30 uppercase tracking-[0.5em] text-center">
                        Protocol: UPLINK_v5.5 // Core: Final-Academic-Release // Status: Operational
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
